name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Build
        run: npm run build --workspace=packages/svix-admin

      - name: Test
        run: npm test --workspace=packages/svix-admin

      - name: Lint
        run: npm run lint

      - name: Publish to npm
        run: npm publish --workspace=packages/svix-admin --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
