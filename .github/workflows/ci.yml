name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build --workspace=packages/svix-admin

      - name: Test
        run: npm test --workspace=packages/svix-admin

      - name: Lint
        run: npm run lint
